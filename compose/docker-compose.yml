name: portfolio

services:
  portfolio-webapp:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: portfolio-webapp
    restart: unless-stopped
    ports:
      - "10580:80"
    mem_limit: 512m
    cpus: 0.5
    memswap_limit: 768m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - shared-network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio-webapp.rule=Host(`litwa.dev`) || Host(`www.litwa.dev`)"
      - "traefik.http.routers.portfolio-webapp.entrypoints=websecure"
      - "traefik.http.routers.portfolio-webapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio-webapp.loadbalancer.server.port=80"

networks:
  shared-network:
    external: true
  dokploy-network:
    external: true
